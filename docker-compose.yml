services:
  ollama:
    image: ollama/ollama:latest
    container_name: energyco-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ollama_pull:
    image: ollama/ollama:latest
    container_name: energyco-ollama-pull
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      /bin/sh -c "
        ollama pull mistral &&
        ollama pull nomic-embed-text
      "
    depends_on:
      ollama:
        condition: service_healthy

  ingest:
    build: .
    container_name: energyco-ingest
    command: python ingest.py --reset
    volumes:
      - ./data:/app/data
      - ./chroma_db:/app/chroma_db
    env_file:
      - .env
    depends_on:
      ollama_pull:
        condition: service_completed_successfully

  api:
    build: .
    container_name: energyco-api
    # CMD from Dockerfile: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./logs:/app/logs
    env_file:
      - .env
    depends_on:
      ingest:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  chat_app:
    build: .
    container_name: energyco-chat
    command: python chat.py
    volumes:
      - ./data:/app/data
      - ./chroma_db:/app/chroma_db
      - ./logs:/app/logs
    env_file:
      - .env
    stdin_open: true
    tty: true
    depends_on:
      ingest:
        condition: service_completed_successfully

volumes:
  ollama_data:
